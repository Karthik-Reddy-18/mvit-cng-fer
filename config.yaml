data:
  fer2013_path: "data/fer2013"
  image_size: 48
  num_classes: 7

emotions: ["angry", "disgust", "fear", "happy", "sad", "surprise", "neutral"]

model:
  patch_size: 4
  embed_dim: 768
  num_heads: 12
  num_layers: 12
  mlp_ratio: 4
  num_scales: 3
  contrastive_dim: 128
  dropout: 0.2

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  optimizer: "adam"
  save_dir: "models/"
  log_dir: "outputs/logs/"
